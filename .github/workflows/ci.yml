name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # 金仓兼容 PostgreSQL，CI 用 PostgreSQL 镜像替代
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: aiot
          POSTGRES_USER: aiot
          POSTGRES_PASSWORD: aiot123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build & Test
        run: |
          cd code
          mvn verify -B -Dspring.profiles.active=ci
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/aiot
          SPRING_DATASOURCE_USERNAME: aiot
          SPRING_DATASOURCE_PASSWORD: aiot123

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Checkstyle
        run: |
          cd code
          mvn checkstyle:check -B
